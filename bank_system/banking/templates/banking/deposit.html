{% extends 'base.html' %}
{% block title %}Deposit - Bank System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="text-center mb-3">Deposit Money</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100">Deposit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
